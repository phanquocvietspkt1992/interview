services:

  # SQL Server — account-service's own dedicated database
  # Rule: no other service connects to this DB
  account-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "Banking@123!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1434:1433"       # mapped to 1434 to avoid conflict with any local SQL Server on 1433
    volumes:
      - account-db-data:/var/opt/mssql

  # The account-service itself
  account-service:
    build:
      context: .
      dockerfile: src/AccountService.API/Dockerfile
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__AccountDb: "Server=account-db;Database=AccountServiceDb;User Id=sa;Password=Banking@123!;TrustServerCertificate=True;"
    depends_on:
      - account-db

volumes:
  account-db-data:

services:

  transaction-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "Banking@123!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1436:1433"
    volumes:
      - transaction-db-data:/var/opt/mssql

  transaction-service:
    build:
      context: .
      dockerfile: src/TransactionService.API/Dockerfile
    ports:
      - "5003:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__TransactionDb: "Server=transaction-db;Database=TransactionServiceDb;User Id=sa;Password=Banking@123!;TrustServerCertificate=True;"
    depends_on:
      - transaction-db

volumes:
  transaction-db-data:
